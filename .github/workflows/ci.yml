name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      e2e_baseline: ${{ steps.filter.outputs.e2e_baseline }}
      tenant_isolation: ${{ steps.filter.outputs.tenant_isolation }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect files that require heavy checks
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "e2e_baseline=true" >> "$GITHUB_OUTPUT"
            echo "tenant_isolation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > /tmp/changed-files.txt

          echo "Changed files:"
          sed 's/^/- /' /tmp/changed-files.txt

          e2e_regex='^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|playwright\.config\.(ts|js)|next\.config\.(ts|js)|proxy\.ts|middleware\.ts|app/|components/|contexts/|hooks/|lib/|types/|e2e/|public/)'
          tenant_regex='^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|playwright\.config\.(ts|js)|proxy\.ts|middleware\.ts|supabase/|types/database\.ts|lib/(security|supabase|db|billing)/|app/(api|\(auth\)|\(dashboard\)|\(onboarding\)|admin)/|e2e/multi-user-isolation\.spec\.ts)'

          if grep -Eq "$e2e_regex" /tmp/changed-files.txt; then
            echo "e2e_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "e2e_baseline=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq "$tenant_regex" /tmp/changed-files.txt; then
            echo "tenant_isolation=true" >> "$GITHUB_OUTPUT"
          else
            echo "tenant_isolation=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key

  e2e-baseline:
    needs:
      - validate
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Skip baseline E2E when unaffected
        if: needs.changes.outputs.e2e_baseline != 'true'
        run: echo "Skipping baseline E2E because this PR does not touch app/runtime files."

      - name: Checkout
        if: needs.changes.outputs.e2e_baseline == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.changes.outputs.e2e_baseline == 'true'
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        if: needs.changes.outputs.e2e_baseline == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: needs.changes.outputs.e2e_baseline == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: needs.changes.outputs.e2e_baseline == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        if: needs.changes.outputs.e2e_baseline == 'true'
        uses: supabase/setup-cli@d347ba47d3fb7eeeddbbc793bc8d4779caf773ea # v1.5.0
        with:
          version: 2.75.0

      - name: Start local Supabase
        if: needs.changes.outputs.e2e_baseline == 'true'
        run: supabase start

      - name: Export local Supabase env
        if: needs.changes.outputs.e2e_baseline == 'true'
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed 's/="/=/; s/"$//' >> "$GITHUB_ENV"

      - name: Run baseline E2E coverage
        if: needs.changes.outputs.e2e_baseline == 'true'
        run: pnpm test:e2e:baseline
        env:
          TEST_USER_EMAIL: e2e-test@complyeur.test
          TEST_USER_PASSWORD: E2ETestPassword123!
          TEST_USER_COMPANY: Playwright Test Company

      - name: Upload baseline Playwright report
        if: always() && needs.changes.outputs.e2e_baseline == 'true'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: playwright-report-baseline
          path: |
            .test-output/playwright-report
            .test-output/test-results
          if-no-files-found: ignore

      - name: Stop local Supabase
        if: always() && needs.changes.outputs.e2e_baseline == 'true'
        run: supabase stop

  tenant-isolation:
    needs:
      - validate
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Skip tenant isolation E2E when unaffected
        if: needs.changes.outputs.tenant_isolation != 'true'
        run: echo "Skipping tenant isolation E2E because this PR does not touch tenant/auth/database-sensitive files."

      - name: Checkout
        if: needs.changes.outputs.tenant_isolation == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        if: needs.changes.outputs.tenant_isolation == 'true'
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        if: needs.changes.outputs.tenant_isolation == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: needs.changes.outputs.tenant_isolation == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: needs.changes.outputs.tenant_isolation == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        if: needs.changes.outputs.tenant_isolation == 'true'
        uses: supabase/setup-cli@d347ba47d3fb7eeeddbbc793bc8d4779caf773ea # v1.5.0
        with:
          version: 2.75.0

      - name: Start local Supabase
        if: needs.changes.outputs.tenant_isolation == 'true'
        run: supabase start

      - name: Export local Supabase env
        if: needs.changes.outputs.tenant_isolation == 'true'
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed 's/="/=/; s/"$//' >> "$GITHUB_ENV"

      - name: Run multi-tenant isolation E2E
        if: needs.changes.outputs.tenant_isolation == 'true'
        run: pnpm test:e2e:multi-user
        env:
          TEST_USER_EMAIL: e2e-test@complyeur.test
          TEST_USER_PASSWORD: E2ETestPassword123!
          TEST_USER_COMPANY: Playwright Test Company
          E2E_MULTI_USER_A_EMAIL: e2e.multi.a@complyeur.test
          E2E_MULTI_USER_A_PASSWORD: TestPassword123!
          E2E_MULTI_USER_A_COMPANY: E2E Multi User Company A
          E2E_MULTI_USER_B_EMAIL: e2e.multi.b@complyeur.test
          E2E_MULTI_USER_B_PASSWORD: TestPassword123!
          E2E_MULTI_USER_B_COMPANY: E2E Multi User Company B

      - name: Stop local Supabase
        if: always() && needs.changes.outputs.tenant_isolation == 'true'
        run: supabase stop
